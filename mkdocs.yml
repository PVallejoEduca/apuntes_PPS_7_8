site_name: Tutorial de Desarrollo Android con Jetpack Compose
site_description: Apuntes prácticos de desarrollo Android con Jetpack Compose
site_author: Mikel Aingeru Jorge Soteras
copyright: "Materiales creados por Mikel Aingeru Jorge Soteras  ©  2026"

# Configuración del tema Material Design
theme:
  name: material
  # Lenguaje de la interfaz (búsqueda, botones, etc.)
  language: es
  
  # Características de usabilidad y navegación
  features:
    - navigation.tabs # Activa el menú superior principal
    - navigation.sections # Agrupa las páginas en el menú lateral de forma limpia
    - navigation.top # Botón flotante para "volver arriba" en apuntes largos
    - search.suggest # Sugerencias automáticas en la barra de búsqueda
    - search.highlight # Resalta el texto buscado dentro de la página
    - content.code.copy # Esencial: Botón nativo para copiar los bloques de código
    - content.code.annotate # Permite añadir explicaciones con un "+" dentro del código

  # Paleta de colores (Estilo Android con modo claro/oscuro)
  palette:
    # Modo Claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal # Verde azulado profesional, muy usado en Android Docs
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    
    # Modo Oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

# Extensiones de Markdown (El motor para las explicaciones técnicas)
markdown_extensions:
  - admonition # Activa las cajas de "Nota", "Peligro", "Aviso"
  - pymdownx.details # Permite hacer que las cajas de aviso sean desplegables
  - pymdownx.superfences # Soporte mejorado para bloques de código
  - pymdownx.tabbed: # Activa las pestañas (Ideal para mostrar Compose vs XML)
      alternate_style: true
  - pymdownx.highlight: # Configuración avanzada del resaltado de sintaxis
      anchor_linenums: true # Permite enlazar a una línea de código específica
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite # Resalta código dentro de un párrafo de texto
  - pymdownx.snippets # Permite incrustar código de archivos .kt o .xml externos
  - pymdownx.tasklist: # Permite hacer listas de tareas mediante [x] y []
        custom_checkbox: true
  - md_in_html # Habilita que MKDocs procese Markdown dentro de etiquetas HTML
  - attr_list # Permite añadir listas de atributos para inyectar CSS (clases y estilos) a cualquier elemento Markdown

# Importar mi propio CSS y JS
extra_css:
  - css/extra.css

extra_javascript:
  - js/extra.js

# control de la navegación
nav:
  - Inicio: index.md
  - Guía de Referencia: guia.md